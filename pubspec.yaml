name: botum
description: "Botum - Authentic Khmer Handmade Souvenir E-commerce App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  google_sign_in: ^7.2.0
  flutter_facebook_auth: ^7.2.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  font_awesome_flutter: ^11.0.0
  cached_network_image: ^3.4.1
  image_picker: ^1.2.3
  intl: ^0.20.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
